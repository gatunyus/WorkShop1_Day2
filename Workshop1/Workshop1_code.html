<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-size: 30px; 
            line-height: 1.5; 
            font-family: sans-serif; 
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <script>
    // 1. จำลอง Input ที่ส่งมาจาก API เป็นข้อความ JSON (String)
    let jsonResponse = '{"priceInput": 850.50, "qtyInput": 3}';

    // 2. แปลง JSON String ให้กลายเป็น JavaScript Object
    let requestData = JSON.parse(jsonResponse);

    // 3. ดึงข้อมูลแบบ Object (ใช้จุด .) และนำมาคำนวณ
    let price = requestData.priceInput;
    let qty = requestData.qtyInput;

    let subTotal = price * qty;
    let vat = subTotal * 0.07;
    let grandTotal = subTotal + vat;

    // 4. แสดงผล
    let strHTML = "--- สรุปยอดการสั่งซื้อ (JS JSON Input) ---<br>";
    strHTML += "ราคาสินค้า: " + price.toFixed(2) + " บาท x " + qty + " ชิ้น<br>";
    strHTML += "ยอดรวม: " + subTotal.toFixed(2) + " บาท<br>";
    strHTML += "VAT (7%): " + vat.toFixed(2) + " บาท<br>";
    strHTML += "<strong>ยอดชำระสุทธิ: " + grandTotal.toFixed(2) + " บาท</strong>";

    document.getElementById("output").innerHTML = strHTML;
    </script>
</body>
</html>
